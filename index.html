<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор мебели</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 360px;
            background: #ffffff;
            padding: 24px 20px;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 22px;
            color: #2c3e50;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .sidebar label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
            margin-bottom: -12px;
        }

        .sidebar select,
        .sidebar input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #dcdcdc;
            border-radius: 8px;
            font-size: 15px;
            background: #fafafa;
            transition: 0.2s;
        }

        .sidebar select:focus,
        .sidebar input:focus {
            outline: none;
            border-color: #4a90d9;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-add {
            background: #27ae60;
            color: #fff;
            width: 100%;
        }
        .btn-add:hover {
            background: #219a52;
        }

        .btn-remove {
            background: #e74c3c;
            color: #fff;
            font-size: 13px;
            padding: 6px 14px;
        }
        .btn-remove:hover {
            background: #c0392b;
        }

        .price-block {
            background: #f0f7ff;
            border: 1px solid #c8ddf5;
            border-radius: 12px;
            padding: 14px 16px;
            text-align: center;
        }

        .price-block .total {
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
        }

        .price-block .sub {
            font-size: 13px;
            color: #777;
        }

        /* ===== MAIN AREA ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #e9eef3;
            padding: 32px;
        }

        .main h1 {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .scene {
            width: 700px;
            height: 450px;
            background: #ffffff;
            border-radius: 18px;
            border: 2px solid #d6dde3;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.07);
        }

        /* ===== FURNITURE ON SCENE ===== */
        .furniture-item {
            position: absolute;
            cursor: move;
            border-radius: 4px;
            user-select: none;
            transition: box-shadow 0.15s;
        }

        .furniture-item:hover {
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.5);
        }

        .furniture-item.selected {
            box-shadow: 0 0 0 4px #e74c3c !important;
        }

        .furniture-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
        }

        /* ===== BASKET ===== */
        .basket {
            margin-top: 24px;
            width: 700px;
            background: #fff;
            border-radius: 14px;
            border: 2px solid #d6dde3;
            padding: 16px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
        }

        .basket h3 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .basket-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .basket-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f7f9fb;
            border: 1px solid #e0e5ea;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
        }

        .basket-item .btn-remove {
            font-size: 11px;
            padding: 3px 8px;
        }

        .empty-basket {
            color: #aaa;
            font-style: italic;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- ====== SIDEBAR ====== -->
    <div class="sidebar">
        <h2>Furniture Builder</h2>

        <label for="typeSelect">Type</label>
        <select id="typeSelect">
            <option value="bookshelf">Bookshelf</option>
            <option value="cabinet">Cabinet</option>
        </select>

        <label for="widthInput">Width (cm)</label>
        <input type="number" id="widthInput" value="80" min="20" max="400">

        <label for="heightInput">Height (cm)</label>
        <input type="number" id="heightInput" value="90" min="20" max="400">

        <label for="colorInput">Color</label>
        <input type="color" id="colorInput" value="#8B5E3C">

        <button class="btn btn-add" id="addBtn">Add to Scene</button>

        <div class="price-block">
            <div class="sub">Estimated Total</div>
            <div class="total" id="totalPrice">0 RUB</div>
            <div class="sub" id="itemCount">0 items</div>
        </div>
    </div>

    <!-- ====== SCENE ====== -->
    <div class="main">
        <h1>Your Room</h1>
        <div class="scene" id="scene"></div>

        <div class="basket">
            <h3>Basket</h3>
            <ul class="basket-list" id="basketList">
                <li class="empty-basket">Empty — add some furniture</li>
            </ul>
        </div>
    </div>

    <script>
        // ============================
        //   CATALOG
        // ============================
        var furnitureCatalog = {
            bookshelf: {
                name: "Bookshelf",
                pricePerUnit: 4000,
                icon: "📚",
                minW: 40,
                minH: 60,
                maxW: 150,
                maxH: 250
            },
            cabinet: {
                name: "Cabinet",
                pricePerUnit: 15000,
                icon: "🚪",
                minW: 60,
                minH: 80,
                maxW: 200,
                maxH: 260
            }
        };

        // ============================
        //   STATE
        // ============================
        var furnitureItems = [];
        var selectedId = null;

        // DOM elements
        var sceneEl = document.getElementById("scene");
        var typeSelect = document.getElementById("typeSelect");
        var widthInput = document.getElementById("widthInput");
        var heightInput = document.getElementById("heightInput");
        var colorInput = document.getElementById("colorInput");
        var addBtn = document.getElementById("addBtn");
        var totalPriceEl = document.getElementById("totalPrice");
        var itemCountEl = document.getElementById("itemCount");
        var basketListEl = document.getElementById("basketList");

        // ============================
        //   FUNCTIONS
        // ============================

        function generateId() {
            return "f_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        }

        function getItemById(id) {
            for (var i = 0; i < furnitureItems.length; i++) {
                if (furnitureItems[i].id === id) return furnitureItems[i];
            }
            return null;
        }

        function addFurniture() {
            var type = typeSelect.value;
            var w = parseInt(widthInput.value, 10);
            var h = parseInt(heightInput.value, 10);
            var color = colorInput.value;
            var catalog = furnitureCatalog[type];

            if (isNaN(w) || isNaN(h) || w < catalog.minW || w > catalog.maxW || h < catalog.minH || h > catalog.maxH) {
                alert(
                    "Invalid size for «" + catalog.name + "».\n" +
                    "Width: " + catalog.minW + "–" + catalog.maxW + " cm\n" +
                    "Height: " + catalog.minH + "–" + catalog.maxH + " cm"
                );
                return;
            }

            var scale = 2.8;
            var displayW = Math.max(40, Math.min(w * scale, 600));
            var displayH = Math.max(40, Math.min(h * scale, 400));

            var maxX = sceneEl.clientWidth - displayW - 10;
            var maxY = sceneEl.clientHeight - displayH - 10;
            var x = Math.max(5, Math.floor(Math.random() * (maxX > 5 ? maxX : 10)));
            var y = Math.max(5, Math.floor(Math.random() * (maxY > 5 ? maxY : 10)));

            var newItem = {
                id: generateId(),
                type: type,
                name: catalog.name,
                icon: catalog.icon,
                widthCm: w,
                heightCm: h,
                color: color,
                x: x,
                y: y,
                displayW: displayW,
                displayH: displayH,
                price: catalog.pricePerUnit
            };

            furnitureItems.push(newItem);
            selectedId = newItem.id;
            renderAll();
        }

        function removeFurniture(id) {
            var newArr = [];
            for (var i = 0; i < furnitureItems.length; i++) {
                if (furnitureItems[i].id !== id) newArr.push(furnitureItems[i]);
            }
            furnitureItems = newArr;
            if (selectedId === id) selectedId = null;
            renderAll();
        }

        function selectFurniture(id) {
            selectedId = id;
            renderAll();
        }

        function moveFurniture(id, newX, newY) {
            var item = getItemById(id);
            if (!item) return;
            var maxX = sceneEl.clientWidth - item.displayW;
            var maxY = sceneEl.clientHeight - item.displayH;
            item.x = Math.max(0, Math.min(newX, maxX));
            item.y = Math.max(0, Math.min(newY, maxY));
            renderAll();
        }

        function calculateTotal() {
            var sum = 0;
            for (var i = 0; i < furnitureItems.length; i++) {
                sum += furnitureItems[i].price;
            }
            return sum;
        }

        // ============================
        //   DRAG & DROP
        // ============================
        var dragItemId = null;
        var dragOffsetX = 0;
        var dragOffsetY = 0;

        function onDragStart(e, id) {
            dragItemId = id;
            selectFurniture(id);
            var rect = e.currentTarget.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragOffsetX = clientX - rect.left;
            dragOffsetY = clientY - rect.top;
            e.preventDefault();
        }

        function onDragMove(e) {
            if (!dragItemId) return;
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            var sceneRect = sceneEl.getBoundingClientRect();
            var newX = clientX - sceneRect.left - dragOffsetX;
            var newY = clientY - sceneRect.top - dragOffsetY;
            moveFurniture(dragItemId, newX, newY);
        }

        function onDragEnd() {
            dragItemId = null;
        }

        // ============================
        //   RENDER
        // ============================
        function renderScene() {
            sceneEl.innerHTML = "";

            for (var i = 0; i < furnitureItems.length; i++) {
                var item = furnitureItems[i];

                var el = document.createElement("div");
                el.className = "furniture-item" + (item.id === selectedId ? " selected" : "");
                el.style.width = item.displayW + "px";
                el.style.height = item.displayH + "px";
                el.style.left = item.x + "px";
                el.style.top = item.y + "px";
                el.style.backgroundColor = item.color;

                var iconSpan = document.createElement("span");
                iconSpan.style.cssText =
                    "position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:" +
                    Math.min(item.displayW, item.displayH) * 0.45 +
                    "px;pointer-events:none;opacity:0.8;";
                iconSpan.textContent = item.icon;
                el.appendChild(iconSpan);

                var label = document.createElement("div");
                label.className = "furniture-label";
                label.textContent = item.name + " (" + item.widthCm + "×" + item.heightCm + " cm)";
                el.appendChild(label);

                (function(id) {
                    el.addEventListener("mousedown", function(e) { onDragStart(e, id); });
                    el.addEventListener("touchstart", function(e) { onDragStart(e, id); }, { passive: false });
                    el.addEventListener("click", function(e) {
                        e.stopPropagation();
                        selectFurniture(id);
                    });
                })(item.id);

                sceneEl.appendChild(el);
            }
        }

        function renderBasket() {
            basketListEl.innerHTML = "";

            if (furnitureItems.length === 0) {
                var li = document.createElement("li");
                li.className = "empty-basket";
                li.textContent = "Empty — add some furniture";
                basketListEl.appendChild(li);
            } else {
                for (var i = 0; i < furnitureItems.length; i++) {
                    var item = furnitureItems[i];

                    var li = document.createElement("li");
                    li.className = "basket-item";

                    var span = document.createElement("span");
                    span.textContent =
                        item.icon + " " + item.name + " " + item.widthCm + "×" + item.heightCm + " cm — " + item.price + " RUB";

                    var btn = document.createElement("button");
                    btn.className = "btn-remove";
                    btn.textContent = "Remove";

                    (function(id) {
                        btn.addEventListener("click", function() { removeFurniture(id); });
                    })(item.id);

                    li.appendChild(span);
                    li.appendChild(btn);
                    basketListEl.appendChild(li);
                }
            }
        }

        function renderTotals() {
            var total = calculateTotal();
            totalPriceEl.textContent = total.toLocaleString("ru-RU") + " RUB";
            itemCountEl.textContent = furnitureItems.length + " items";
        }

        function renderAll() {
            renderScene();
            renderBasket();
            renderTotals();
        }

        // ============================
        //   GLOBAL EVENTS
        // ============================
        document.addEventListener("mousemove", onDragMove);
        document.addEventListener("mouseup", onDragEnd);
        document.addEventListener("touchmove", onDragMove, { passive: false });
        document.addEventListener("touchend", onDragEnd);

        sceneEl.addEventListener("click", function(e) {
            if (e.target === sceneEl) {
                selectedId = null;
                renderAll();
            }
        });

        addBtn.addEventListener("click", addFurniture);

        document.addEventListener("keydown", function(e) {
            if (e.key === "Delete" || e.key === "Backspace") {
                if (selectedId) {
                    removeFurniture(selectedId);
                }
            }
        });

        // ============================
        //   INITIAL RENDER
        // ============================
        renderAll();
    </script>
</body>
</html>
